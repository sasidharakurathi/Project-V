<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vega Initialization</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap');

        :root {
            --core-bg: rgba(0, 2, 5, 0.85);
            /* Absolute darkest teal/black */
            --hud-cyan: #00e5ff;
            --hud-cyan-dim: rgba(0, 229, 255, 0.15);
            --hud-cyan-glow: rgba(0, 229, 255, 0.4);
            --font-display: 'Rajdhani', sans-serif;
            --font-data: 'JetBrains Mono', monospace;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            font-family: var(--font-data);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }

        .splash-container {
            width: 90%;
            height: 90%;
            background: var(--core-bg);
            border: 1px solid var(--hud-cyan);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            backdrop-filter: blur(12px);
            -webkit-app-region: drag;
            /* Angled cut corners */
            clip-path: polygon(30px 0,
                    100% 0,
                    100% calc(100% - 30px),
                    calc(100% - 30px) 100%,
                    0 100%,
                    0 30px);
            box-shadow: inset 0 0 50px rgba(0, 229, 255, 0.2);
        }

        .splash-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--hud-cyan-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--hud-cyan-dim) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.3;
            pointer-events: none;
        }

        .orb-container {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .core-orb {
            width: 60px;
            height: 60px;
            background: var(--core-bg);
            border: 2px solid var(--hud-cyan);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--hud-cyan-glow), inset 0 0 10px var(--hud-cyan-glow);
            animation: pulse-core 2s infinite ease-in-out;
            z-index: 2;
        }

        .ring-1,
        .ring-2 {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
        }

        .ring-1 {
            width: 100%;
            height: 100%;
            border-top-color: var(--hud-cyan);
            border-bottom-color: var(--hud-cyan);
            animation: spin 3s linear infinite;
        }

        .ring-2 {
            width: 70%;
            height: 70%;
            border: 1px dashed var(--hud-cyan);
            opacity: 0.5;
            animation: spin 8s linear infinite reverse;
        }

        .title {
            color: var(--hud-cyan);
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 12px;
            margin: 0;
            text-shadow: 0 0 15px var(--hud-cyan-glow);
        }

        .subtitle {
            color: #7abccc;
            font-size: 11px;
            letter-spacing: 4px;
            margin-top: 12px;
            z-index: 10;
        }

        .footer-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .loading-text {
            color: var(--hud-cyan);
            font-size: 11px;
            letter-spacing: 3px;
            animation: pulse-text 1.5s infinite ease-in-out;
            width: 100%;
            text-align: center;
        }

        .telemetry {
            color: var(--hud-cyan);
            font-size: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--hud-cyan-glow);
            width: 100%;
            text-align: center;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse-core {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
                box-shadow: 0 0 30px var(--hud-cyan), inset 0 0 20px var(--hud-cyan);
            }

            100% {
                transform: scale(0.95);
                opacity: 0.8;
            }
        }

        @keyframes pulse-text {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 8px var(--hud-cyan-glow);
            }

            100% {
                opacity: 0.4;
            }
        }
    </style>
</head>

<body>
    <div class="splash-container">
        <div class="orb-container">
            <div class="ring-1"></div>
            <div class="ring-2"></div>
            <div class="core-orb"></div>
        </div>
        <h1 class="title">VEGA</h1>
        <div class="subtitle">ORBITAL INITIALIZATION</div>

        <div class="footer-container">
            <div class="loading-text" id="status-text">ESTABLISHING UPLINK...</div>
            <div class="telemetry" id="telemetry-display" style="display: none;"></div>
        </div>
    </div>

    <script>
        if (window.ipcRenderer) {
            window.ipcRenderer.on('telemetry', (event, data) => {
                const statusText = document.getElementById('status-text');
                const telemetryDisplay = document.getElementById('telemetry-display');

                if (statusText && telemetryDisplay && data) {
                    statusText.innerText = "ALL SYSTEMS ONLINE";
                    statusText.style.color = "#00ffcc";
                    statusText.style.animation = "none";

                    const cpu = data.cpu.cpu_percent.toFixed(1);
                    const ram = data.memory.memory_percent.toFixed(1);
                    telemetryDisplay.style.display = 'block';
                    telemetryDisplay.innerText = `CPU: ${cpu}%  |  RAM: ${ram}%`;
                }
            });
        }
    </script>
</body>

</html>
